<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JADWAL PENGIRIMAN</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-airport: #0f1113; 
            --header-bg: #15181a; 
            --card-bg: #1a1d20; 
            --border-color: #24282b; 
            --text-white: #e1e4e8; 
            --text-primary: #cbd0d6; 
            --text-secondary: #9aa1a8; 
            --accent-gold: #c9b084; 
            
            --color-proses: #98ffb3;      
            --color-terjadwal: #b4c8db;   
            --color-tunggu: #e0acac;      
            --color-langsir: #ffdf9e;     
            --color-delivered: #c4d9f2;  
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; 
            background-color: var(--bg-airport); 
            color: var(--text-primary);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        .header {
            background: var(--header-bg);
            padding: 1vh 2vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .header h1 { 
            margin: 0; 
            font-size: clamp(14px, 2.5vh, 22px); 
            letter-spacing: 1px; 
            color: var(--text-white);
            font-weight: 800; 
        }
        
        #targetDate { 
            font-size: clamp(9px, 1.2vh, 13px); 
            color: var(--accent-gold); 
        }
        
        #clock { 
            font-size: clamp(18px, 3.5vh, 28px); 
            font-weight: 800; 
            color: var(--text-white); 
        }

        .main-content { 
            flex: 1; 
            overflow-y: auto; 
            width: 100%;
            background: linear-gradient(180deg, var(--bg-airport) 0%, #050505 100%);
        }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        
        thead {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--header-bg);
        }

        th {
            color: var(--text-secondary);
            text-align: left;
            padding: 1.2vh 8px;
            font-size: clamp(9px, 1.1vh, 12px);
            text-transform: uppercase;
            border-bottom: 2px solid var(--border-color);
        }

        td { 
            padding: 1vh 8px; 
            font-size: clamp(10px, 1.4vh, 15px); 
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
            word-wrap: break-word;
        }

        /* STATUS COLORS */
        .st-proses { color: var(--color-proses); animation: smooth-blink 2s infinite; }
        .st-langsir { color: var(--color-langsir); animation: smooth-blink 2.5s infinite; }
        .st-terjadwal { color: var(--color-terjadwal); }
        .st-tunggu { color: var(--color-tunggu); }
        .st-delivered { color: var(--color-delivered); }

        @keyframes smooth-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .nopol-block { 
            background: #24282b; 
            color: #fff; 
            padding: 2px 4px; 
            border-radius: 3px; 
            font-weight: 800; 
            font-size: 0.85em;
            display: inline-block;
        }

        .sopir-name { color: var(--text-white); font-weight: 700; display: block; margin-top: 2px; }

        .dest-text {
            font-size: 0.8em; 
            color: var(--text-secondary); 
            display: block; 
        }

        .footer-marquee {
            flex-shrink: 0;
            background: #000; 
            color: var(--text-secondary); 
            height: 25px; 
            line-height: 25px; 
            font-size: 10px;
        }

        /* PENGATURAN LEBAR KOLOM AGAR MUAT DI HP */
        .col-unit { width: 40%; }
        .col-qty { width: 12%; text-align: center; }
        .col-store { width: 25%; }
        .col-status { width: 23%; text-align: right; }

        @media (max-width: 600px) {
            td, th { padding: 8px 4px; }
            .nopol-block { font-size: 9px; }
            .sopir-name { font-size: 10px; }
            .dest-text { font-size: 9px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>SCHEDULE DELIVERY</h1>
            <div id="targetDate">LOADING...</div>
        </div>
        <div class="clock-container">
            <div id="clock">00:00:00</div>
        </div>
    </div>

    <div class="main-content">
        <table>
            <thead>
                <tr>
                    <th class="col-unit">UNIT / DRIVER</th>
                    <th class="col-qty">QTY</th>
                    <th class="col-store">STORAGE</th>
                    <th class="col-status">STATUS</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="footer-marquee">
        <marquee>SAFETY FIRST • PERIKSA KENDARAAN • PATUHI BATAS KECEPATAN • DILARANG MENGGUNAKAN HP SAAT MENGEMUDI</marquee>
    </div>

    <script>
        const SUPABASE_URL = 'https://ntaectphgoelmhzrkatp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50YWVjdHBoZ29lbG1oenJrYXRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzExNDYsImV4cCI6MjA4ODE0NzE0Nn0.-8E98wpkzHBARRhW6PKhBtf2XKhWFjq7idAzw9jlcKg';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function getWIB() {
            return new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Jakarta"}));
        }

        async function loadDashboard() {
            const now = getWIB();
            const isoHariIni = now.toISOString().split('T')[0];
            
            document.getElementById('targetDate').innerText = now.toLocaleDateString('id-ID', { 
                weekday: 'short', day: 'numeric', month: 'short', year: 'numeric'
            }).toUpperCase();

            const { data, error } = await _supabase
                .from('data_pengiriman')
                .select('*')
                .gte('tanggal', isoHariIni)
                .order('tanggal', { ascending: true });

            if (error) return;

            renderData(data, isoHariIni);
        }

        function renderData(data, isoHariIni) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            let lastDate = isoHariIni;

            data.forEach((row) => {
                if (row.tanggal > lastDate) {
                    const fmtDate = new Date(row.tanggal).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' }).toUpperCase();
                    tbody.innerHTML += `<tr><td colspan="4" style="background:#1a1d20; color:#c9b084; text-align:center; font-size:10px; font-weight:800; padding:5px;">${fmtDate}</td></tr>`;
                    lastDate = row.tanggal;
                }

                const s = (row.status || "").toUpperCase();
                let sClass = "st-terjadwal";
                if(s.includes("PROSES")) sClass = "st-proses";
                else if(s.includes("LANGSIR")) sClass = "st-langsir";
                else if(s.includes("DELIVERED")) sClass = "st-delivered";
                else if(s.includes("TUNGGU")) sClass = "st-tunggu";

                tbody.innerHTML += `
                    <tr>
                        <td>
                            <span class="nopol-block">${row.nopol || '-'}</span>
                            <span class="sopir-name">${row.sopir || '-'}</span>
                            <span class="dest-text">${row.lokasi || '-'}</span>
                        </td>
                        <td style="text-align:center; font-weight:800; color:var(--accent-gold);">${row.jumlah_keluar || 0}</td>
                        <td style="color:var(--text-secondary); font-size:0.85em;">${row.supplier || '-'}</td>
                        <td class="${sClass}" style="text-align:right; font-weight:800; font-size:0.85em;">${s}</td>
                    </tr>
                `;
            });
        }

        function updateClock() {
            document.getElementById('clock').innerText = getWIB().toLocaleTimeString('id-ID', {hour12:false});
        }

        setInterval(updateClock, 1000);
        setInterval(loadDashboard, 30000);
        _supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'data_pengiriman' }, loadDashboard).subscribe();
        loadDashboard();
    </script>
</body>
</html>
