<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Jadwal Besok - Stable Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #1a237e;
            --accent: #ffd600;
            --bg: #0d1117;
            --card-bg: #161b22;
            --text-main: #e6edf3;
            --border: #30363d;
            --status-wait: #f44336;
            --status-plan: #9c27b0;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background-color: var(--bg); 
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(90deg, #1a237e 0%, #283593 100%);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--accent);
        }

        .header h1 { margin: 0; font-size: 20px; letter-spacing: 1.5px; color: white; }
        .live-status { font-size: 13px; color: #4af54a; font-weight: bold; text-align: right; }
        .dot { height: 10px; width: 10px; background: #4af54a; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .table-container {
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        table { width: 100%; border-collapse: collapse; text-align: left; table-layout: fixed; }
        th { 
            background: #21262d; 
            padding: 12px; 
            font-size: 11px; 
            color: #8b949e; 
            text-transform: uppercase; 
            border-bottom: 2px solid var(--border);
        }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; word-wrap: break-word; }

        /* Row Styling */
        .group-header { background: #1f2937; color: var(--accent); font-weight: bold; font-size: 13px; }
        .nopol-badge { background: #30363d; padding: 4px 8px; border-radius: 4px; font-family: monospace; color: white; font-weight: bold; border: 1px solid #444; }
        .qty-val { color: #4af54a; font-weight: 800; font-size: 16px; }
        
        .status-badge { 
            font-size: 10px; 
            padding: 3px 6px; 
            border-radius: 3px; 
            font-weight: bold; 
            display: inline-block;
        }
        .st-terjadwal { background: var(--status-plan); color: white; }
        .st-tunggu { background: var(--status-wait); color: white; }

        .rit-label { font-size: 10px; color: var(--accent); margin-left: 5px; font-style: italic; }

        /* Footer Marquee */
        .footer-marquee {
            background: #000;
            color: var(--accent);
            padding: 12px 0;
            white-space: nowrap;
            overflow: hidden;
            border-top: 1px solid var(--border);
        }

        .marquee-content {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 30s linear infinite;
            font-weight: bold;
            font-size: 15px;
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>JADWAL PENGIRIMAN BESOK</h1>
            <div id="targetDate" style="color: var(--accent); font-weight: bold; font-size: 14px; margin-top: 5px;">Memuat Jadwal...</div>
        </div>
        <div class="live-status">
            <div><span class="dot"></span> LIVE CLOUD</div>
            <div id="clock">00:00:00 WIB</div>
        </div>
    </div>

    <div class="main-content">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 15%;">SUPPLIER</th>
                        <th style="width: 20%;">CUSTOMER</th>
                        <th style="width: 15%;">LOKASI</th>
                        <th style="width: 18%;">UNIT/NOPOL</th>
                        <th style="width: 15%;">SOPIR</th>
                        <th style="width: 7%;">QTY</th>
                        <th style="width: 10%;">STATUS</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="7" style="text-align:center; padding:50px; color:#8b949e;">Sinkronisasi Data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="footer-marquee">
        <div class="marquee-content" id="runningText">
            MEMUAT INFORMASI JADWAL TERBARU... HARAP CEK STATUS UNIT SECARA BERKALA... SAFETY FIRST...
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ntaectphgoelmhzrkatp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50YWVjdHBoZ29lbG1oenJrYXRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzExNDYsImV4cCI6MjA4ODE0NzE0Nn0.-8E98wpkzHBARRhW6PKhBtf2XKhWFjq7idAzw9jlcKg';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function getWIBDate() {
            return new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Jakarta"}));
        }

        async function loadDashboard() {
            // Setup Tanggal Besok
            const besok = getWIBDate();
            besok.setDate(besok.getDate() + 1);
            const isoBesok = besok.toISOString().split('T')[0];
            
            document.getElementById('targetDate').innerText = besok.toLocaleDateString('id-ID', { 
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' 
            }).toUpperCase();

            const { data, error } = await _supabase
                .from('data_pengiriman')
                .select('*')
                .eq('tanggal', isoBesok);

            if (error) return;

            // Filter: Terjadwal ATAU Tunggu Info
            const filtered = data.filter(item => {
                const s = (item.status || "").toUpperCase();
                return s.includes("TERJADWAL") || s.includes("TUNGGU");
            });

            renderData(filtered);
            updateMarquee(filtered);
        }

        function renderData(data) {
            const tbody = document.getElementById('tableBody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px; color:#8b949e;">TIDAK ADA JADWAL TERDATA UNTUK BESOK</td></tr>';
                return;
            }

            // Logika Pengelompokan: Berdasarkan Supplier -> Lokasi -> Nopol
            // Ini untuk menangani Rit dan Lokasi yang sama
            const grouped = {};
            data.forEach(item => {
                const key = `${item.supplier || 'LAIN'}`;
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(item);
            });

            tbody.innerHTML = '';

            for (const supplier in grouped) {
                // Header Supplier
                const headRow = document.createElement('tr');
                headRow.className = 'group-header';
                headRow.innerHTML = `<td colspan="7">DEPO/SUPPLIER: ${supplier}</td>`;
                tbody.appendChild(headRow);

                // Hitung Rit untuk Nopol yang sama dalam supplier ini
                const nopolCounts = {};

                grouped[supplier].forEach(row => {
                    const nopol = row.nopol || '-';
                    nopolCounts[nopol] = (nopolCounts[nopol] || 0) + 1;
                    const currentRit = nopolCounts[nopol];

                    const tr = document.createElement('tr');
                    const isWait = (row.status || "").toUpperCase().includes("TUNGGU");
                    
                    tr.innerHTML = `
                        <td style="color:#8b949e; font-size:12px;">${row.supplier}</td>
                        <td style="font-weight:bold;">${row.delivery_to || '-'}</td>
                        <td>${row.lokasi || '-'}</td>
                        <td>
                            <span class="nopol-badge">${nopol}</span>
                            ${nopolCounts[nopol] > 1 || data.filter(x=>x.nopol === nopol).length > 1 ? `<span class="rit-label">(RIT ${currentRit})</span>` : ''}
                        </td>
                        <td>${row.sopir || '-'}</td>
                        <td class="qty-val">${row.jumlah_keluar || 0}</td>
                        <td>
                            <span class="status-badge ${isWait ? 'st-tunggu' : 'st-terjadwal'}">
                                ${isWait ? 'TUNGGU INFO' : 'TERJADWAL'}
                            </span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        function updateMarquee(data) {
            const el = document.getElementById('runningText');
            if(data.length > 0) {
                const info = data.map(i => `${i.nopol} > ${i.delivery_to}`).join('  ||  ');
                el.innerText = `JADWAL PENGIRIMAN BESOK: ${info}  ||  TETAP WASPADA DAN SAFETY FIRST!`.toUpperCase();
            } else {
                el.innerText = "BELUM ADA DATA JADWAL TERINPUT UNTUK TANGGAL BESOK.";
            }
        }

        function updateClock() {
            const now = getWIBDate();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', {hour12:false}) + " WIB";
        }

        // Realtime Listener
        _supabase.channel('custom-all-channel')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'data_pengiriman' }, () => {
            loadDashboard();
        }).subscribe();

        setInterval(updateClock, 1000);
        setInterval(loadDashboard, 300000); // Auto refresh 5 menit
        loadDashboard();
    </script>
</body>
</html>
