<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Jadwal Besok - Green Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #004d40; /* Hijau Tua */
            --accent: #4db6ac;  /* Hijau Tosca */
            --bg: #00251a;      /* Background Sangat Gelap */
            --card-bg: #00332a;
            --text-main: #e0f2f1;
            --border: #00695c;
            --status-wait: #ff5252;
            --status-plan: #ffd600;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background-color: var(--bg); 
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #00251a 100%);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--accent);
        }

        .header h1 { margin: 0; font-size: 18px; letter-spacing: 1px; color: var(--accent); }
        .live-status { font-size: 12px; color: #64ffda; text-align: right; }
        .dot { height: 8px; width: 8px; background: #64ffda; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .table-container {
            background: var(--card-bg);
            border-radius: 10px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { 
            background: rgba(0,0,0,0.3); 
            padding: 12px; 
            font-size: 10px; 
            color: var(--accent); 
            text-transform: uppercase; 
            border-bottom: 2px solid var(--border);
        }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }

        .group-header { background: #004d40; color: #fff; font-weight: bold; font-size: 12px; }
        .nopol-badge { background: #00251a; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--accent); color: white; font-weight: bold; }
        .qty-val { color: #64ffda; font-weight: 800; font-size: 15px; }
        
        .status-badge { font-size: 9px; padding: 3px 6px; border-radius: 3px; font-weight: bold; color: #000; }
        .st-terjadwal { background: var(--status-plan); }
        .st-tunggu { background: var(--status-wait); color: #fff; }

        /* Running Text Footer */
        .footer-marquee {
            background: #001a14;
            color: #e0f2f1;
            padding: 10px 0;
            border-top: 2px solid var(--primary);
            overflow: hidden;
        }

        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee 45s linear infinite;
            font-size: 14px;
        }

        .marquee-content b { color: var(--accent); }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .header h1 { font-size: 15px; }
            td, th { padding: 8px; font-size: 12px; }
            .qty-val { font-size: 13px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>JADWAL PENGIRIMAN BESOK</h1>
            <div id="targetDate" style="color: white; font-size: 12px; margin-top: 3px;">Memuat...</div>
        </div>
        <div class="live-status">
            <div><span class="dot"></span> LIVE CLOUD</div>
            <div id="clock">00:00:00 WIB</div>
        </div>
    </div>

    <div class="main-content">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>CUSTOMER/TUJUAN</th>
                        <th>UNIT/NOPOL</th>
                        <th>SOPIR</th>
                        <th style="width: 50px; text-align: center;">QTY</th>
                        <th style="width: 80px; text-align: center;">STATUS</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="5" style="text-align:center; padding:30px;">Menghubungkan Database...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="footer-marquee">
        <div class="marquee-content" id="runningText"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ntaectphgoelmhzrkatp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50YWVjdHBoZ29lbG1oenJrYXRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzExNDYsImV4cCI6MjA4ODE0NzE0Nn0.-8E98wpkzHBARRhW6PKhBtf2XKhWFjq7idAzw9jlcKg';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function getWIBDate() {
            return new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Jakarta"}));
        }

        // Pesan Running Text yang diperbarui
        function setupMarquee() {
            const msgs = [
                "🚛 <b>SAFETY FIRST:</b> Cek tekanan ban, rem, dan lampu sebelum keberangkatan.",
                "🛑 <b>ANTI-NGANTUK:</b> Istirahat 15 menit setiap 4 jam mengemudi. Jangan paksakan!",
                "⚠️ <b>KEAMANAN:</b> Pastikan segel tangki utuh dan tidak bocor saat tiba di tujuan.",
                "✨ <b>KELUARGA:</b> Ingat, ada keluarga menanti Anda di rumah dengan selamat.",
                "📱 <b>DILARANG:</b> Jangan menggunakan handphone saat kemudi sedang berjalan.",
                "⛽ <b>OPERASIONAL:</b> Laporkan segera jika ada kendala mesin di perjalanan.",
                "📏 <b>JARAK AMAN:</b> Selalu jaga jarak aman dengan kendaraan di depan Anda.",
                "🌧️ <b>CUACA:</b> Hati-hati jalan licin saat hujan, kurangi kecepatan kendaraan.",
                "🛠️ <b>TOOLS:</b> Pastikan kunci-kunci dan ban serep tersedia di dalam unit.",
                "📄 <b>DOKUMEN:</b> Periksa kembali Surat Jalan (SJ) dan Berita Acara (BA) sebelum berangkat."
            ];
            document.getElementById('runningText').innerHTML = msgs.join(" &nbsp;&nbsp;&nbsp;&nbsp; | &nbsp;&nbsp;&nbsp;&nbsp; ");
        }

        async function loadData() {
            const besok = getWIBDate();
            besok.setDate(besok.getDate() + 1);
            const isoBesok = besok.toISOString().split('T')[0];
            
            document.getElementById('targetDate').innerText = besok.toLocaleDateString('id-ID', { 
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' 
            }).toUpperCase();

            const { data, error } = await _supabase
                .from('data_pengiriman')
                .select('*')
                .eq('tanggal', isoBesok);

            if (error) return;

            const filtered = data.filter(item => {
                const s = (item.status || "").toUpperCase();
                return s.includes("TERJADWAL") || s.includes("TUNGGU");
            });

            renderTable(filtered);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:30px; color:#64ffda;">TIDAK ADA JADWAL UNTUK BESOK</td></tr>';
                return;
            }

            // Grouping Supplier
            const grouped = {};
            data.forEach(item => {
                const k = item.supplier || 'LAIN-LAIN';
                if (!grouped[k]) grouped[k] = [];
                grouped[k].push(item);
            });

            tbody.innerHTML = '';
            for (const supplier in grouped) {
                const hRow = document.createElement('tr');
                hRow.className = 'group-header';
                hRow.innerHTML = `<td colspan="5">📦 DEPO: ${supplier}</td>`;
                tbody.appendChild(hRow);

                const nopolCounts = {};
                grouped[supplier].forEach(row => {
                    const nopol = row.nopol || '-';
                    nopolCounts[nopol] = (nopolCounts[nopol] || 0) + 1;
                    const rit = nopolCounts[nopol];

                    const tr = document.createElement('tr');
                    const isWait = (row.status || "").toUpperCase().includes("TUNGGU");
                    
                    tr.innerHTML = `
                        <td><b>${row.delivery_to || '-'}</b><br><small>${row.lokasi || '-'}</small></td>
                        <td><span class="nopol-badge">${nopol}</span> ${nopolCounts[nopol]>1 || data.filter(x=>x.nopol===nopol).length>1 ? `<span style="font-size:9px; color:var(--accent)">RIT ${rit}</span>`:''}</td>
                        <td>${row.sopir || '-'}</td>
                        <td class="qty-val" style="text-align:center;">${row.jumlah_keluar || 0}</td>
                        <td style="text-align:center;">
                            <span class="status-badge ${isWait ? 'st-tunggu' : 'st-terjadwal'}">
                                ${isWait ? 'TUNGGU' : 'OK'}
                            </span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        function updateClock() {
            const now = getWIBDate();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', {hour12:false}) + " WIB";
        }

        // Realtime Subscription
        _supabase.channel('obs-green').on('postgres_changes', { event: '*', schema: 'public', table: 'data_pengiriman' }, () => {
            loadData();
        }).subscribe();

        setupMarquee();
        loadData();
        setInterval(updateClock, 1000);
        setInterval(loadData, 300000);
    </script>
</body>
</html>
