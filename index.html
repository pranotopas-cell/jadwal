<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDS Mobile - BBM System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-airport: #000c26;
            --header-bg: #000511;
            --text-yellow: #ffeb3b;
            --text-white: #ffffff;
            --blue-light: #00d4ff;
            --green-fids: #4af54a;
        }

        body { 
            font-family: 'Arial', sans-serif;
            margin: 0; 
            background-color: var(--bg-airport); 
            color: var(--text-white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: var(--header-bg);
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--text-yellow);
            flex-shrink: 0;
        }
        .header h1 { margin: 0; font-size: 18px; letter-spacing: 1px; }
        #clock { font-size: 18px; font-weight: bold; color: var(--text-yellow); }

        /* Table */
        .main-content { 
            flex: 1; 
            overflow-y: auto; 
            width: 100%;
            padding-bottom: 45px; /* Kasih ruang agar tidak tertutup marquee */
        }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        
        th {
            background: var(--header-bg);
            color: var(--text-yellow);
            text-align: left;
            padding: 10px 5px;
            font-size: 11px;
            text-transform: uppercase;
            border-bottom: 1px solid #1a3a6e;
            position: sticky;
            top: 0;
        }

        td { 
            padding: 10px 5px; 
            font-size: 13px; 
            font-weight: bold; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            vertical-align: middle;
        }

        /* Flight Column (Nopol & Sopir) */
        .flight-cell { display: flex; align-items: center; gap: 6px; overflow: hidden; }
        .nopol-block { 
            background: white; 
            color: black; 
            padding: 4px 0; 
            border-radius: 2px; 
            font-weight: 900; 
            font-size: 11px;
            min-width: 80px;
            text-align: center;
            flex-shrink: 0;
        }
        .sopir-name { 
            color: var(--blue-light); 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 12px;
        }

        /* Time/Depo Column */
        .depo-text { color: var(--green-fids); display: block; font-size: 11px; }
        .besok-tag { color: var(--text-yellow); font-size: 10px; font-weight: bold; }

        /* Remarks Status */
        .st-proses { color: #ff5252; animation: blink 0.8s infinite; }
        .st-langsir { color: #ffa726; }
        .st-normal { color: white; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.1; } 100% { opacity: 1; } }

        /* Footer Marquee Fixed for Mobile */
        .footer-marquee {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000;
            color: var(--text-yellow);
            height: 40px;
            line-height: 40px;
            font-size: 14px;
            font-weight: bold;
            border-top: 1px solid var(--text-yellow);
            z-index: 100;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>DEPARTURES</h1>
            <div id="targetDate" style="font-size: 10px; color: #aaa;">SINKRONISASI...</div>
        </div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="main-content">
        <table>
            <thead>
                <tr>
                    <th style="width: 45%;">FLIGHT</th>
                    <th style="width: 15%; text-align: center;">GATE</th>
                    <th style="width: 20%;">TIME</th>
                    <th style="width: 20%; text-align: right;">REMARKS</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <div class="footer-marquee">
        <marquee scrollamount="6">
            INFO KESELAMATAN: Pastikan Segel Terpasang Sempurna • Periksa Rem dan Ban Sebelum Jalan • Gunakan APD Lengkap • Dilarang Mengemudi Saat Mengantuk • Utamakan Keselamatan Kerja...
        </marquee>
    </div>

    <script>
        const SUPABASE_URL = 'https://ntaectphgoelmhzrkatp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50YWVjdHBoZ29lbG1oenJrYXRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzExNDYsImV4cCI6MjA4ODE0NzE0Nn0.-8E98wpkzHBARRhW6PKhBtf2XKhWFjq7idAzw9jlcKg';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function getWIB() {
            return new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Jakarta"}));
        }

        async function loadDashboard() {
            const hariIni = getWIB();
            const besok = new Date(hariIni);
            besok.setDate(besok.getDate() + 1);

            const isoHariIni = hariIni.toISOString().split('T')[0];
            const isoBesok = besok.toISOString().split('T')[0];
            
            document.getElementById('targetDate').innerText = hariIni.toLocaleDateString('id-ID', { 
                weekday: 'long', day: 'numeric', month: 'long' 
            }).toUpperCase();

            const { data, error } = await _supabase
                .from('data_pengiriman')
                .select('*')
                .in('tanggal', [isoHariIni, isoBesok]);

            if (error) return;

            // 1. Filter: Hilangkan yang sudah DELIVERED
            let filtered = data.filter(item => !(item.status || "").toUpperCase().includes("DELIVERED"));

            // 2. Sorting Manual sesuai permintaan
            const priority = { "PROSES": 1, "TERJADWAL": 2, "LANGSIR": 3, "TUNGGU": 4 };
            
            filtered.sort((a, b) => {
                const statusA = (a.status || "").toUpperCase();
                const statusB = (b.status || "").toUpperCase();
                
                let valA = 99, valB = 99;
                Object.keys(priority).forEach(key => { if(statusA.includes(key)) valA = priority[key]; });
                Object.keys(priority).forEach(key => { if(statusB.includes(key)) valB = priority[key]; });

                if (valA !== valB) return valA - valB;
                return new Date(a.tanggal) - new Date(b.tanggal);
            });

            renderData(filtered, isoBesok);
        }

        function renderData(data, isoBesok) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            data.forEach(row => {
                const statusRaw = (row.status || "").toUpperCase();
                const isBesok = row.tanggal === isoBesok;
                
                let statusDisplay = statusRaw;
                let statusClass = "st-normal";

                if (statusRaw.includes("PROSES")) statusClass = "st-proses";
                else if (statusRaw.includes("LANGSIR")) statusClass = "st-langsir";
                else if (statusRaw.includes("TERJADWAL")) statusDisplay = "HARI INI";

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div class="flight-cell">
                            <div class="nopol-block">${row.nopol || '-'}</div>
                            <div class="sopir-name">${row.sopir || '-'}</div>
                        </div>
                        <div style="font-size:10px; color:#aaa; margin-left:86px;">TO: ${row.delivery_to || '-'}</div>
                    </td>
                    <td style="color:var(--text-yellow); text-align:center; font-size:16px;">${row.jumlah_keluar || '0'}</td>
                    <td>
                        <span class="depo-text">${row.supplier || '-'}</span>
                        ${isBesok ? '<span class="besok-tag">(BESOK)</span>' : ''}
                    </td>
                    <td class="${statusClass}" style="text-align:right; font-size:11px;">${statusDisplay}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateClock() {
            const now = getWIB();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', {hour12:false});
        }

        _supabase.channel('fids-final').on('postgres_changes', { event: '*', schema: 'public', table: 'data_pengiriman' }, () => {
            loadDashboard();
        }).subscribe();

        setInterval(updateClock, 1000);
        setInterval(loadDashboard, 60000); 
        loadDashboard();
    </script>
</body>
</html>
