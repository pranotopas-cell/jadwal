<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JADWAL PENGIRIMAN</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-airport: #0f1113; 
            --header-bg: #15181a; 
            --card-bg: #1a1d20; 
            --border-color: #24282b; 
            --text-white: #e1e4e8; 
            --text-primary: #cbd0d6; 
            --text-secondary: #9aa1a8; 
            --accent-gold: #c9b084; 
            
            --color-proses: #98ffb3;      
            --color-terjadwal: #b4c8db;   
            --color-tunggu: #e0acac;      
            --color-langsir: #ffdf9e;     
            --color-delivered: #c4d9f2;  
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* KUNCI BODY AGAR TIDAK SCROLL LUAR */
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; 
            background-color: var(--bg-airport); 
            color: var(--text-primary);
            height: 100vh; /* Paksa tinggi layar pas */
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        .header {
            background: var(--header-bg);
            padding: 1vh 2vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .header h1 { 
            margin: 0; 
            font-size: clamp(16px, 2.5vh, 22px); 
            letter-spacing: 2px; 
            color: var(--text-white);
            font-weight: 800; 
        }
        
        #targetDate { 
            font-size: clamp(10px, 1.5vh, 13px); 
            color: var(--accent-gold); 
            font-weight: 600; 
        }
        
        #clock { 
            font-size: clamp(20px, 3.5vh, 28px); 
            font-weight: 800; 
            color: var(--text-white); 
        }

        /* AREA UTAMA DENGAN SCROLL INTERNAL */
        .main-content { 
            flex: 1; 
            overflow-y: auto; /* Hanya tabel yang boleh scroll jika data overload */
            width: 100%;
            background: linear-gradient(180deg, var(--bg-airport) 0%, #050505 100%);
        }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        
        /* HEADER TABEL TETAP DI ATAS */
        thead {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--header-bg);
        }

        th {
            color: var(--text-dim);
            text-align: left;
            padding: 1.5vh 15px;
            font-size: clamp(10px, 1.2vh, 12px);
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border-color);
        }

        td { 
            padding: 1.2vh 15px; 
            font-size: clamp(12px, 1.6vh, 15px); 
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        tr:hover td { background-color: var(--card-bg); }

        .date-divider {
            background: rgba(255,255,255,0.03);
            color: var(--accent-gold);
            text-align: center;
            font-size: 11px;
            padding: 8px 0;
            font-weight: 800;
            letter-spacing: 2px;
        }

        /* STATUS & ANIMASI */
        .st-proses { color: var(--color-proses); animation: smooth-blink 2s infinite; }
        .st-langsir { color: var(--color-langsir); animation: smooth-blink 2.5s infinite; }
        .st-terjadwal { color: var(--color-terjadwal); }
        .st-tunggu { color: var(--color-tunggu); }
        .st-delivered { color: var(--color-delivered); }

        @keyframes smooth-blink { 
            0%, 100% { opacity: 1; } 50% { opacity: 0.4; } 
        }

        .nopol-block { 
            background: #24282b; 
            color: #fff; 
            padding: 4px 8px; 
            border-radius: 4px; 
            font-weight: 800; 
            font-size: clamp(10px, 1.3vh, 12px);
            display: inline-block;
            min-width: 80px;
            text-align: center;
        }

        .sopir-name { color: var(--text-white); font-weight: 700; margin-left: 8px; }

        .dest-text {
            font-size: clamp(10px, 1.3vh, 12px); 
            color: var(--text-secondary); 
            display: block; 
            margin-top: 4px; 
        }

        .footer-marquee {
            flex-shrink: 0;
            background: #000; 
            color: var(--text-secondary); 
            height: 30px; 
            line-height: 30px; 
            font-size: 11px;
            border-top: 1px solid var(--border-color);
        }

        /* PENYESUAIAN HP */
        @media (max-width: 600px) {
            th:nth-child(2), td:nth-child(2), /* QTY */
            th:nth-child(3), td:nth-child(3)  /* STORAGE */ {
                display: none; /* Sembunyikan kolom kurang penting di HP agar tidak sesak */
            }
            th:nth-child(1) { width: 70% !important; }
            th:nth-child(4) { width: 30% !important; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>SCHEDULE DELIVERY</h1>
            <div id="targetDate">LOADING...</div>
        </div>
        <div class="clock-container">
            <div id="clock">00:00:00</div>
            <div class="cloud-status" style="font-size: 9px; display: flex; align-items: center; justify-content: flex-end; gap: 5px; color: var(--color-proses);">
                <span style="height:6px; width:6px; background:var(--color-proses); border-radius:50%;"></span> ONLINE
            </div>
        </div>
    </div>

    <div class="main-content">
        <table>
            <thead>
                <tr>
                    <th style="width: 45%;">UNIT / DRIVER / DEST</th>
                    <th style="width: 10%; text-align: center;">QTY</th>
                    <th style="width: 25%;">STORAGE</th>
                    <th style="width: 20%; text-align: right;">STATUS</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="footer-marquee">
        <marquee scrollamount="4">
            <strong>NOTE : SAFETY FIRST • PERIKSA KENDARAAN SEBELUM BERANGKAT • PATUHI BATAS KECEPATAN • DILARANG MENGGUNAKAN HP SAAT MENGEMUDI • LAPORKAN KENDALA SEGERA...</strong>
        </marquee>
    </div>

    <script>
        const SUPABASE_URL = 'https://ntaectphgoelmhzrkatp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50YWVjdHBoZ29lbG1oenJrYXRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzExNDYsImV4cCI6MjA4ODE0NzE0Nn0.-8E98wpkzHBARRhW6PKhBtf2XKhWFjq7idAzw9jlcKg';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function getWIB() {
            return new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Jakarta"}));
        }

        async function loadDashboard() {
            const now = getWIB();
            const isoHariIni = now.toISOString().split('T')[0];
            
            document.getElementById('targetDate').innerText = now.toLocaleDateString('id-ID', { 
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
            }).toUpperCase();

            const { data, error } = await _supabase
                .from('data_pengiriman')
                .select('*')
                .gte('tanggal', isoHariIni)
                .order('tanggal', { ascending: true });

            if (error) return;

            const dataHariIni = data.filter(row => row.tanggal === isoHariIni);
            const dataMendatang = data.filter(row => row.tanggal > isoHariIni);
            const isSemuaDelivered = dataHariIni.length > 0 && dataHariIni.every(row => (row.status || "").toUpperCase().includes("DELIVERED"));

            renderData(isSemuaDelivered ? dataMendatang : data, isoHariIni);
        }

        function renderData(data, isoHariIni) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            let lastDate = isoHariIni;

            const priority = { "PROSES": 1, "LANGSIR": 2, "TERJADWAL": 3, "TUNGGU": 4, "DELIVERED": 5 };

            data.sort((a, b) => {
                if (a.tanggal !== b.tanggal) return new Date(a.tanggal) - new Date(b.tanggal);
                let pA = 99, pB = 99;
                Object.keys(priority).forEach(k => { if(a.status?.toUpperCase().includes(k)) pA = priority[k]; });
                Object.keys(priority).forEach(k => { if(b.status?.toUpperCase().includes(k)) pB = priority[k]; });
                return pA - pB;
            });

            data.forEach((row) => {
                if (row.tanggal > lastDate) {
                    const fmtDate = new Date(row.tanggal).toLocaleDateString('id-ID', { weekday: 'short', day: 'numeric', month: 'short' }).toUpperCase();
                    tbody.innerHTML += `<tr><td colspan="4" class="date-divider">JADWAL ${fmtDate}</td></tr>`;
                    lastDate = row.tanggal;
                }

                const s = (row.status || "").toUpperCase();
                let sClass = "st-terjadwal";
                if(s.includes("PROSES")) sClass = "st-proses";
                else if(s.includes("LANGSIR")) sClass = "st-langsir";
                else if(s.includes("DELIVERED")) sClass = "st-delivered";
                else if(s.includes("TUNGGU")) sClass = "st-tunggu";

                tbody.innerHTML += `
                    <tr>
                        <td>
                            <div style="display:flex; align-items:center;">
                                <span class="nopol-block">${row.nopol || '-'}</span>
                                <span class="sopir-name">${row.sopir || '-'}</span>
                            </div>
                            <span class="dest-text">TO: ${row.delivery_to || '-'} | <span style="color:var(--accent-gold)">${row.lokasi || '-'}</span></span>
                        </td>
                        <td style="text-align:center; font-weight:800; color:var(--accent-gold);">${row.jumlah_keluar || 0}</td>
                        <td style="color:var(--text-secondary); font-size:12px;">${row.supplier || '-'}</td>
                        <td class="${sClass}" style="text-align:right; font-weight:800;">${s}</td>
                    </tr>
                `;
            });
        }

        function updateClock() {
            document.getElementById('clock').innerText = getWIB().toLocaleTimeString('id-ID', {hour12:false});
        }

        setInterval(updateClock, 1000);
        setInterval(loadDashboard, 30000);
        _supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'data_pengiriman' }, loadDashboard).subscribe();
        loadDashboard();
    </script>
</body>
</html>
