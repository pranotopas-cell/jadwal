<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Corporate Logistics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --corp-blue: #0a192f;
            --corp-green: #00c853;
            --corp-light: #f8f9fa;
            --border-color: #e0e6ed;
            --text-dark: #1e293b;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            background-color: #f0f2f5; 
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Corporate */
        .header {
            background-color: var(--corp-blue);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--corp-green);
        }

        .header-title h1 { margin: 0; font-size: 18px; letter-spacing: 1px; font-weight: 800; }
        .header-title span { font-size: 11px; color: var(--corp-green); font-weight: 600; }

        /* Animasi Live Pulse */
        .live-status {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 12px;
        }

        .pulse {
            width: 10px;
            height: 10px;
            background: var(--corp-green);
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(0, 200, 83, 0.4);
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 200, 83, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 200, 83, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 200, 83, 0); }
        }

        /* Main Area */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .table-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        table { width: 100%; border-collapse: collapse; }
        
        thead th {
            background-color: #f8fafc;
            color: #64748b;
            font-size: 10px;
            text-transform: uppercase;
            padding: 12px 15px;
            text-align: left;
            border-bottom: 2px solid var(--border-color);
        }

        .group-header {
            background: #f1f5f9;
            color: var(--corp-blue);
            font-weight: 700;
            font-size: 12px;
            padding: 10px 15px;
        }

        td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }

        .nopol-box {
            background: #1e293b;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 12px;
        }

        .status-pill {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 800;
            display: inline-block;
        }
        .st-ok { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .st-wait { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        /* Footer Running Text (Fix Mobile) */
        .footer {
            background: white;
            height: 45px;
            border-top: 2px solid var(--corp-blue);
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
            z-index: 100;
        }

        .marquee-box {
            display: flex;
            white-space: nowrap;
            animation: marquee-move 40s linear infinite;
        }

        .marquee-item {
            padding: 0 40px;
            font-size: 13px;
            font-weight: 600;
            color: var(--corp-blue);
        }

        .marquee-item b { color: var(--corp-green); }

        @keyframes marquee-move {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .header-title h1 { font-size: 15px; }
            td, th { padding: 10px 8px; font-size: 12px; }
            .status-pill { padding: 2px 6px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-title">
            <h1>LOGISTICS MANAGEMENT</h1>
            <span id="targetDate">-- LOADING DATA --</span>
        </div>
        <div class="live-status">
            <div class="pulse"></div>
            <div id="clock">00:00:00</div>
        </div>
    </header>

    <main class="main-content">
        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Tujuan</th>
                        <th>Nopol</th>
                        <th style="text-align:center">KL</th>
                        <th style="text-align:center">Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="4" style="text-align:center; padding:50px;">Synchronizing with Cloud Server...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer class="footer">
        <div class="marquee-box" id="marqueeBox">
            </div>
    </footer>

    <script>
        const SUPABASE_URL = 'https://ntaectphgoelmhzrkatp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50YWVjdHBoZ29lbG1oenJrYXRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzExNDYsImV4cCI6MjA4ODE0NzE0Nn0.-8E98wpkzHBARRhW6PKhBtf2XKhWFjq7idAzw9jlcKg';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function getWIBDate() {
            return new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Jakarta"}));
        }

        function setupMarquee() {
            const msgs = [
                "<b>SAFETY:</b> Patuhi batas kecepatan dan cek tekanan ban.",
                "<b>REST:</b> Istirahat jika lelah, keselamatan Anda paling utama.",
                "<b>DOCS:</b> Pastikan Surat Jalan & BA sesuai sebelum berangkat.",
                "<b>DRIVE:</b> Dilarang menggunakan ponsel saat mengemudi.",
                "<b>VEHICLE:</b> Laporkan segera jika ada kendala pada mesin unit."
            ];
            const box = document.getElementById('marqueeBox');
            const content = msgs.map(m => `<div class="marquee-item">${m}</div>`).join('');
            // Double content agar loop tidak putus
            box.innerHTML = content + content;
        }

        async function fetchData() {
            const besok = getWIBDate();
            besok.setDate(besok.getDate() + 1);
            const isoBesok = besok.toISOString().split('T')[0];
            
            document.getElementById('targetDate').innerText = besok.toLocaleDateString('id-ID', { 
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' 
            }).toUpperCase();

            const { data, error } = await _supabase
                .from('data_pengiriman')
                .select('*')
                .eq('tanggal', isoBesok);

            if (error) return;

            const filtered = data.filter(item => {
                const s = (item.status || "").toUpperCase();
                return s.includes("TERJADWAL") || s.includes("TUNGGU");
            });

            renderTable(filtered);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px; color:#94a3b8;">NO SCHEDULED DATA FOR TOMORROW</td></tr>';
                return;
            }

            const grouped = {};
            data.forEach(item => {
                const k = item.supplier || 'OTHERS';
                if (!grouped[k]) grouped[k] = [];
                grouped[k].push(item);
            });

            tbody.innerHTML = '';
            for (const supplier in grouped) {
                const hRow = document.createElement('tr');
                hRow.innerHTML = `<td colspan="4" class="group-header">📦 DEPO: ${supplier}</td>`;
                tbody.appendChild(hRow);

                const nopolCounts = {};
                grouped[supplier].forEach(row => {
                    const nopol = row.nopol || '-';
                    nopolCounts[nopol] = (nopolCounts[nopol] || 0) + 1;
                    const isWait = (row.status || "").toUpperCase().includes("TUNGGU");
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><b>${row.delivery_to || '-'}</b><br><small style="color:#64748b">${row.lokasi || '-'}</small></td>
                        <td>
                            <span class="nopol-box">${nopol}</span>
                            ${nopolCounts[nopol]>1 || data.filter(x=>x.nopol===nopol).length>1 ? `<br><small style="color:var(--corp-green); font-weight:bold">RIT ${nopolCounts[nopol]}</small>` : ''}
                        </td>
                        <td style="text-align:center; font-weight:800; color:var(--corp-blue)">${row.jumlah_keluar || 0}</td>
                        <td style="text-align:center;">
                            <span class="status-pill ${isWait ? 'st-wait' : 'st-ok'}">
                                ${isWait ? 'WAITING' : 'READY'}
                            </span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        function updateClock() {
            document.getElementById('clock').innerText = getWIBDate().toLocaleTimeString('id-ID', {hour12:false}) + " WIB";
        }

        // Live Realtime
        _supabase.channel('corp-monitor').on('postgres_changes', { event: '*', schema: 'public', table: 'data_pengiriman' }, () => {
            fetchData();
        }).subscribe();

        setupMarquee();
        fetchData();
        setInterval(updateClock, 1000);
        setInterval(fetchData, 300000);
    </script>
</body>
</html>
