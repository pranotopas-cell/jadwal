<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Jadwal Terjadwal - Live</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #1a237e; /* Biru Gelap Profesional */
            --accent: #ffd600;
            --bg: #0d1117;
            --card-bg: #161b22;
            --text-main: #e6edf3;
            --border: #30363d;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background-color: var(--bg); 
            color: var(--text-main);
            overflow: hidden; /* Supaya layout tetap fix dengan running text */
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(90deg, #1a237e 0%, #283593 100%);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
        }

        .header h1 { margin: 0; font-size: 20px; letter-spacing: 1.5px; color: white; }
        .live-status { font-size: 12px; color: #4af54a; font-weight: bold; }
        .dot { height: 10px; width: 10px; background: #4af54a; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }

        /* Table Area */
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .table-container {
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { 
            background: #21262d; 
            padding: 15px; 
            font-size: 12px; 
            color: #8b949e; 
            text-transform: uppercase; 
            border-bottom: 2px solid var(--border);
        }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .row-terjadwal { background: rgba(255, 214, 0, 0.05); }
        .tgl-col { color: var(--accent); font-weight: bold; }
        .nopol-box { background: #30363d; padding: 4px 8px; border-radius: 4px; font-family: monospace; color: white; }
        .qty-badge { color: #4af54a; font-weight: 800; font-size: 16px; }

        /* Running Text Footer */
        .footer-marquee {
            background: #000;
            color: var(--accent);
            padding: 10px 0;
            border-top: 1px solid var(--border);
            white-space: nowrap;
            overflow: hidden;
            box-sizing: border-box;
        }

        .marquee-content {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 25s linear infinite;
            font-weight: bold;
            font-size: 15px;
            letter-spacing: 1px;
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* Empty State */
        .no-data { text-align: center; padding: 50px; color: #8b949e; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1 id="titleDisplay">MONITORING JADWAL TERJADWAL</h1>
            <span id="dateDisplay" style="font-size: 12px; color: #cbd5e0;"></span>
        </div>
        <div class="live-status">
            <span class="dot"></span> <span id="clock">00:00:00</span> WIB
        </div>
    </div>

    <div class="main-content">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>TANGGAL</th>
                        <th>SUPPLIER</th>
                        <th>CUSTOMER / TUJUAN</th>
                        <th>LOKASI</th>
                        <th>UNIT/NOPOL</th>
                        <th>SOPIR</th>
                        <th>QTY (KL)</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="7" class="no-data">Menghubungkan ke Cloud...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="footer-marquee">
        <div class="marquee-content" id="runningText">
            MEMUAT INFORMASI TERBARU... TETAP UTAMAKAN KESELAMATAN BERKENDARA (SAFETY FIRST)... PASTIKAN UNIT STANDBY TEPAT WAKTU...
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ntaectphgoelmhzrkatp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50YWVjdHBoZ29lbG1oenJrYXRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzExNDYsImV4cCI6MjA4ODE0NzE0Nn0.-8E98wpkzHBARRhW6PKhBtf2XKhWFjq7idAzw9jlcKg';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function getWIBDate() {
            return new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Jakarta"}));
        }

        async function loadJadwalTerjadwal() {
            const now = getWIBDate();
            const startStr = now.toISOString().split('T')[0];
            
            // Ambil data hari ini dan masa depan
            const { data, error } = await _supabase
                .from('data_pengiriman')
                .select('*')
                .gte('tanggal', startStr)
                .order('tanggal', { ascending: true });

            if (error) return;

            // Filter HANYA yang statusnya mengandung kata "TERJADWAL"
            const filtered = data.filter(item => 
                item.status && item.status.toUpperCase().includes('TERJADWAL')
            );

            renderTable(filtered);
            updateMarquee(filtered);
        }

        function renderTable(list) {
            const tbody = document.getElementById('tableBody');
            if (list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="no-data">Tidak ada jadwal dengan status TERJADWAL saat ini.</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            list.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = 'row-terjadwal';
                tr.innerHTML = `
                    <td class="tgl-col">${formatDate(row.tanggal)}<br><small>${row.hari}</small></td>
                    <td>${row.supplier || '-'}</td>
                    <td style="font-weight:bold;">${row.delivery_to || '-'}</td>
                    <td>${row.lokasi || '-'}</td>
                    <td><span class="nopol-box">${row.nopol || '-'}</span></td>
                    <td>${row.sopir || '-'}</td>
                    <td class="qty-badge">${row.jumlah_keluar || 0}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateMarquee(list) {
            const el = document.getElementById('runningText');
            if (list.length > 0) {
                let info = list.map(item => `${item.nopol} (${item.delivery_to})`).join(' --- ');
                el.innerText = `INFO JADWAL TERBARU: ${info} --- TETAP SEMANGAT DAN JAGA KESEHATAN...`.toUpperCase();
            } else {
                el.innerText = "BELUM ADA JADWAL TERJADWAL UNTUK HARI INI. UNIT STANDBY MONITORING.";
            }
        }

        function formatDate(iso) {
            const d = new Date(iso);
            return d.getDate().toString().padStart(2, '0') + '/' + (d.getMonth() + 1).toString().padStart(2, '0');
        }

        function updateClock() {
            const now = getWIBDate();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', {hour12:false});
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('dateDisplay').innerText = now.toLocaleDateString('id-ID', options).toUpperCase();
        }

        // Live Subscription
        _supabase
            .channel('db-monitor')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'data_pengiriman' }, () => {
                loadJadwalTerjadwal();
            })
            .subscribe();

        setInterval(updateClock, 1000);
        setInterval(loadJadwalTerjadwal, 60000); // Refresh tiap menit (backup)
        loadJadwalTerjadwal();
    </script>
</body>
</html>
