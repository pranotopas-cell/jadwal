<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDS Mobile - BBM System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-airport: #000c26;
            --header-bg: #000511;
            --text-yellow: #ffeb3b;
            --text-white: #ffffff;
            --blue-light: #00d4ff;
            --green-fids: #4af54a;
        }

        body { 
            font-family: 'Arial', sans-serif;
            margin: 0; 
            background-color: var(--bg-airport); 
            color: var(--text-white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: var(--header-bg);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--text-yellow);
        }
        .header h1 { margin: 0; font-size: 16px; letter-spacing: 1px; }
        #clock { font-size: 16px; font-weight: bold; color: var(--text-yellow); }

        /* Table Optimization */
        .main-content { flex: 1; overflow-y: auto; width: 100%; }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            table-layout: fixed; /* Kunci agar kolom tidak geser */
        }
        
        th {
            background: var(--header-bg);
            color: var(--text-yellow);
            text-align: left;
            padding: 10px 5px;
            font-size: 11px;
            text-transform: uppercase;
            border-bottom: 1px solid #1a3a6e;
        }

        td { 
            padding: 8px 5px; 
            font-size: 13px; 
            font-weight: bold; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            vertical-align: middle;
            overflow: hidden;
        }

        /* Nopol & Sopir Column */
        .flight-cell { display: flex; align-items: center; gap: 6px; overflow: hidden; }
        .nopol-block { 
            background: white; 
            color: black; 
            padding: 3px 0; 
            border-radius: 3px; 
            font-weight: 900; 
            font-size: 11px;
            min-width: 75px; /* Lebar kotak nopol sama semua */
            text-align: center;
            flex-shrink: 0;
        }
        .sopir-name { 
            color: var(--blue-light); 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 12px; /* Ukuran default */
            max-width: 100%;
        }

        /* Kolom Time dengan Indikator Besok */
        .depo-text { color: var(--green-fids); display: block; line-height: 1.1; }
        .besok-tag { color: #ffa726; font-size: 9px; display: block; margin-top: 2px; }

        /* Status Styles */
        .st-proses { color: #ff5252; animation: blink 1s infinite; }
        .st-langsir { color: #ffa726; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Footer */
        .footer {
            background: black;
            color: var(--text-yellow);
            height: 30px;
            line-height: 30px;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            border-top: 1px solid var(--text-yellow);
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>DEPARTURES</h1>
            <div id="targetDate" style="font-size: 10px; color: #aaa;">LOADING...</div>
        </div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="main-content">
        <table>
            <thead>
                <tr>
                    <th style="width: 42%;">FLIGHT</th>
                    <th style="width: 20%;">DEST</th>
                    <th style="width: 20%;">TIME</th>
                    <th style="width: 18%;">REMARKS</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="footer">
        <marquee scrollamount="5">UTAMAKAN KESELAMATAN KERJA • CEK KESIAPAN ARMADA SEBELUM JALAN • JAGA JARAK AMAN BERKENDARA...</marquee>
    </div>

    <script>
        const SUPABASE_URL = 'https://ntaectphgoelmhzrkatp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50YWVjdHBoZ29lbG1oenJrYXRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzExNDYsImV4cCI6MjA4ODE0NzE0Nn0.-8E98wpkzHBARRhW6PKhBtf2XKhWFjq7idAzw9jlcKg';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function getWIB() {
            return new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Jakarta"}));
        }

        async function loadDashboard() {
            const hariIni = getWIB();
            const besok = new Date(hariIni);
            besok.setDate(besok.getDate() + 1);

            const isoHariIni = hariIni.toISOString().split('T')[0];
            const isoBesok = besok.toISOString().split('T')[0];
            
            document.getElementById('targetDate').innerText = hariIni.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'short' }).toUpperCase();

            const { data, error } = await _supabase
                .from('data_pengiriman')
                .select('*')
                .in('tanggal', [isoHariIni, isoBesok])
                .order('tanggal', { ascending: true })
                .order('id', { ascending: false });

            if (error) return;

            // Filter out delivered
            const filteredData = data.filter(item => !(item.status || "").toUpperCase().includes("DELIVERED"));
            renderData(filteredData, isoBesok);
        }

        function renderData(data, isoBesok) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            data.forEach(row => {
                const statusRaw = (row.status || "").toUpperCase();
                const isBesok = row.tanggal === isoBesok;
                
                let statusDisplay = statusRaw;
                let statusClass = "";

                if (statusRaw.includes("PROSES")) statusClass = "st-proses";
                else if (statusRaw.includes("LANGSIR")) statusClass = "st-langsir";
                else if (statusRaw.includes("TERJADWAL")) statusDisplay = "HARI INI";

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div class="flight-cell">
                            <div class="nopol-block">${row.nopol || '-'}</div>
                            <div class="sopir-name">${row.sopir || '-'}</div>
                        </div>
                    </td>
                    <td style="color:white; font-size:11px;">${row.delivery_to || '-'}</td>
                    <td>
                        <span class="depo-text" style="font-size:11px;">${row.supplier || '-'}</span>
                        <span style="color:var(--text-yellow); font-size:10px;">QTY: ${row.jumlah_keluar || '0'}</span>
                        ${isBesok ? '<span class="besok-tag">(BESOK)</span>' : ''}
                    </td>
                    <td class="${statusClass}" style="font-size:11px; text-align:right;">${statusDisplay}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateClock() {
            const now = getWIB();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', {hour12:false});
        }

        _supabase.channel('fids-mobile').on('postgres_changes', { event: '*', schema: 'public', table: 'data_pengiriman' }, () => {
            loadDashboard();
        }).subscribe();

        setInterval(updateClock, 1000);
        setInterval(loadDashboard, 60000); 
        loadDashboard();
    </script>
</body>
</html>
